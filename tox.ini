[tox]
envlist = py313
skipsdist = true

[testenv]
deps =
    pytest
    pytest-cov
    pyyaml
    music21
    reportlab

commands =
    pytest converters/tests/ \
        --cov=converters \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        {posargs}

[pytest]
testpaths = converters/tests

[coverage:run]
source = converters

[coverage:report]
include = converters/*
omit =
    converters/**/__init__.py
    converters/**/__main__.py
